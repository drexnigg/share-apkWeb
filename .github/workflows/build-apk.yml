name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      web_url:
        description: "Override the website URL baked into the APK"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build & release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve baked-in WEB_URL
        id: weburl
        shell: bash
        run: |
          # Priority: workflow_dispatch input > apk-server-url.txt > built-in default
          OVERRIDE="${{ github.event.inputs.web_url }}"
          if [ -n "$OVERRIDE" ]; then
            URL="$OVERRIDE"
          elif [ -f apk-server-url.txt ]; then
            URL="$(head -n1 apk-server-url.txt | tr -d '[:space:]')"
          else
            URL=""
          fi
          if [ -z "$URL" ]; then
            URL="https://share-booster.onrender.com"
          fi
          echo "Baking WEB_URL=$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Build debug + release APKs
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon \
            -PWEB_URL="${{ steps.weburl.outputs.url }}" \
            assembleDebug assembleRelease

      - name: Rename APKs
        run: |
          mkdir -p artifacts-out
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts-out/share-booster-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk artifacts-out/share-booster.apk

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: share-booster-apk
          path: artifacts-out/

      - name: Publish "latest" release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Share Booster (latest build)
          body: |
            Auto-built APK from commit ${{ github.sha }}.

            - share-booster.apk — release build (recommended)
            - share-booster-debug.apk — debug build

            Baked-in website URL: ${{ steps.weburl.outputs.url }}
          files: |
            artifacts-out/share-booster.apk
            artifacts-out/share-booster-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
