<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Share Booster</title>
    <link rel="icon" href="/assets/icon.png" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash" class="splash">
      <div class="splash-inner">
        <img class="splash-logo" src="/assets/icon.png" alt="" />
        <div class="splash-name">Share Booster</div>
        <div class="splash-tag">Real-time post amplifier</div>
        <div class="splash-spinner"></div>
      </div>
    </div>

    <!-- Auth shell -->
    <div id="auth-shell" class="screen hidden">
      <div class="auth-card" id="auth-card"></div>
    </div>

    <!-- App shell (sidebar + main) -->
    <div id="app-shell" class="app-shell hidden">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <img src="/assets/icon.png" alt="" />
          <div>
            <div class="sb-name">Share Booster</div>
            <div class="sb-tag">v1.0</div>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="sidebar-foot">
          <a id="apk-link" class="apk-mini" href="#" target="_blank" rel="noopener">
            <span class="apk-icon" data-icon="smartphone"></span>
            <span>Get the Android app</span>
          </a>
        </div>
      </aside>

      <div class="main-wrap">
        <header class="topbar">
          <button class="icon-btn ghost menu-btn" id="menu-btn" aria-label="Menu">
            <span data-icon="menu"></span>
          </button>
          <div class="page-title" id="page-title">Dashboard</div>
          <div class="user-chip">
            <span id="role-pill" class="role-pill"></span>
            <span class="user-avatar" id="user-avatar"></span>
            <span class="user-name" id="user-name"></span>
          </div>
        </header>

        <main id="page-root" class="page"></main>

        <footer class="foot">
          Share Booster runs entirely on your own deployment. Use responsibly.
        </footer>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-card" id="modal-card"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="/icons.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
